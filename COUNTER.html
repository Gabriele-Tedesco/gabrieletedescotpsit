<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fine ciclo | 10.06.2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.8s ease, color 0.8s ease;
            padding: 2rem;
        }

        /* STILE BASE - CUPO MA PROFESSIONALE */
        body.default-mode {
            background-color: #0c0c0c;
            color: #e5e5e5;
        }

        .container {
            max-width: 800px;
            width: 100%;
            padding: 3rem;
            border-radius: 4px;
            transition: all 0.8s ease;
        }

        body.default-mode .container {
            background-color: #1a1a1a;
            border-left: 3px solid #404040;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header {
            margin-bottom: 4rem;
            border-bottom: 1px solid #333;
            padding-bottom: 1.5rem;
        }

        .header h1 {
            font-weight: 400;
            font-size: 2.5rem;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        body.default-mode .header h1 {
            color: #808080;
        }

        .header .subtitle {
            font-weight: 300;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        body.default-mode .header .subtitle {
            color: #4d4d4d;
        }

        .timer-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin: 3rem 0;
        }

        .timer-block {
            text-align: center;
        }

        .number {
            font-size: 3.5rem;
            font-weight: 300;
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        body.default-mode .number {
            color: #d4d4d4;
        }

        .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 400;
        }

        body.default-mode .label {
            color: #666;
        }

        .progress-section {
            margin: 3rem 0;
            padding: 1.5rem 0;
            border-top: 1px solid #333;
            border-bottom: 1px solid #333;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.75rem;
        }

        body.default-mode .progress-label {
            color: #737373;
        }

        .progress-bar {
            height: 2px;
            width: 100%;
            background-color: #333;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            transition: width 0.5s ease;
        }

        body.default-mode .progress-fill {
            background-color: #737373;
        }

        .quote-section {
            margin: 2rem 0;
            min-height: 4rem;
        }

        .quote-section p {
            font-size: 1rem;
            font-weight: 300;
            font-style: italic;
            line-height: 1.6;
            opacity: 0.7;
        }

        .footer-note {
            margin-top: 3rem;
            font-size: 0.8rem;
            text-align: right;
        }

        body.default-mode .footer-note {
            color: #404040;
        }

        /* STILE TRANSIZIONE (ULTIMI 10 GIORNI) - PIÙ LUMINOSO MA SEMPRE SOBRIO */
        body.transition-mode {
            background-color: #1a1a1a;
            color: #f0f0f0;
        }

        body.transition-mode .container {
            background-color: #262626;
            border-left: 3px solid #8a8a8a;
            box-shadow: 0 25px 50px -12px rgba(160, 160, 160, 0.1);
        }

        body.transition-mode .header h1 {
            color: #b3b3b3;
        }

        body.transition-mode .number {
            color: #f5f5f5;
        }

        body.transition-mode .progress-fill {
            background-color: #a3a3a3;
        }

        /* STILE FINE - SORPRESA PROFESSIONALE */
        /* Non lo vedrai, ma sarà elegante, non pacchiano */

        @media (max-width: 600px) {
            .timer-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 2rem;
            }
            
            .container {
                padding: 2rem;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .number {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body class="default-mode">
    <div class="container">
        <div class="header">
            <h1 id="mainTitle">10.06.2026</h1>
            <div class="subtitle" id="statusText">ciclo in corso</div>
        </div>

        <div class="timer-grid">
            <div class="timer-block">
                <div class="number" id="days">00</div>
                <div class="label">giorni</div>
            </div>
            <div class="timer-block">
                <div class="number" id="hours">00</div>
                <div class="label">ore</div>
            </div>
            <div class="timer-block">
                <div class="number" id="minutes">00</div>
                <div class="label">minuti</div>
            </div>
            <div class="timer-block">
                <div class="number" id="seconds">00</div>
                <div class="label">secondi</div>
            </div>
        </div>

        <div class="progress-section">
            <div class="progress-label">
                <span>percorso</span>
                <span id="progressPercentage">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div class="quote-section">
            <p id="dailyPhrase">// in attesa</p>
        </div>

        <div class="footer-note" id="footerNote">
            fine ciclo prevista: 10.06.2026
        </div>
    </div>

    <script>
        const endDate = new Date('June 10, 2026 00:00:00').getTime();
        const startDate = new Date('September 15, 2025').getTime(); // inizio anno scolastico approssimativo
        
        const body = document.body;
        const daysEl = document.getElementById('days');
        const hoursEl = document.getElementById('hours');
        const minutesEl = document.getElementById('minutes');
        const secondsEl = document.getElementById('seconds');
        const progressFill = document.getElementById('progressFill');
        const progressPercentage = document.getElementById('progressPercentage');
        const mainTitle = document.getElementById('mainTitle');
        const statusText = document.getElementById('statusText');
        const dailyPhrase = document.getElementById('dailyPhrase');
        const footerNote = document.getElementById('footerNote');

        // Frasi più sobrie, quasi documentaristiche
        const phrases = [
            "il tempo è l'unica risorsa non rinnovabile",
            "ogni giorno è un giorno in meno",
            "l'attesa è la forma più sottile di pazienza",
            "si trascorre più tempo a prepararsi che a vivere",
            "il sistema richiede tempo, il tempo richiede vita",
            "l'istruzione è necessaria, la durata è discutibile",
            "si esce diversi da come si è entrati, non sempre in meglio"
        ];

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = endDate - now;

            if (distance < 0) {
                handleEnd();
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            daysEl.textContent = days.toString().padStart(2, '0');
            hoursEl.textContent = hours.toString().padStart(2, '0');
            minutes.textContent = minutes.toString().padStart(2, '0');
            secondsEl.textContent = seconds.toString().padStart(2, '0');

            // Calcolo percentuale (più realistico)
            const totalDuration = endDate - startDate;
            const elapsed = now - startDate;
            let percent = Math.min(100, Math.max(0, (elapsed / totalDuration) * 100));
            percent = Math.round(percent * 10) / 10; // un decimale
            
            progressFill.style.width = percent + '%';
            progressPercentage.textContent = percent + '%';

            // Gestione stili in base ai giorni
            if (days <= 10 && days > 0) {
                // Ultimi 10 giorni - stile più luminoso ma professionale
                if (!body.classList.contains('transition-mode')) {
                    body.classList.remove('default-mode');
                    body.classList.add('transition-mode');
                    
                    mainTitle.textContent = 'conclusione ciclo';
                    statusText.textContent = 'fase finale';
                    dailyPhrase.textContent = '// ' + days + ' giorni al termine';
                    footerNote.textContent = 'ultima fase';
                }
            } else if (days > 10) {
                // Stile normale
                if (!body.classList.contains('default-mode')) {
                    body.classList.remove('transition-mode');
                    body.classList.add('default-mode');
                    
                    mainTitle.textContent = '10.06.2026';
                    statusText.textContent = 'ciclo in corso';
                    footerNote.textContent = 'fine ciclo prevista: 10.06.2026';
                }
                
                // Cambia frase ogni tanto
                if (seconds % 15 === 0) {
                    const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];
                    dailyPhrase.textContent = '// ' + randomPhrase;
                }
            }
        }

        function handleEnd() {
            body.classList.remove('default-mode', 'transition-mode');
            
            // Stile finale - professionale ma diverso
            const style = document.createElement('style');
            style.textContent = `
                body {
                    background-color: #f5f5f5;
                    color: #1a1a1a;
                }
                .container {
                    background-color: #ffffff;
                    border-left: 3px solid #1a1a1a;
                    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
                }
                .header h1 {
                    color: #1a1a1a;
                }
                .number {
                    color: #333333;
                }
                .progress-fill {
                    background-color: #1a1a1a;
                }
            `;
            document.head.appendChild(style);
            
            mainTitle.textContent = 'ciclo concluso';
            statusText.textContent = 'termine';
            daysEl.textContent = '00';
            hoursEl.textContent = '00';
            minutesEl.textContent = '00';
            secondsEl.textContent = '00';
            dailyPhrase.textContent = '// si esce diversi da come si è entrati';
            progressFill.style.width = '100%';
            progressPercentage.textContent = '100%';
            footerNote.textContent = '10.06.2026';
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
